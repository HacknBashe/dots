{{define "note.html"}}
<div>
    <!-- Note Header -->
    <div class="mb-4">
        <h1 class="text-2xl font-bold"{{if .Color}} style="color: {{.Color}}"{{end}}>{{.Name}}</h1>
        {{template "tags-edit.html" .}}
    </div>

    <!-- Blocks -->
    <div id="blocks" class="prose space-y-0" data-note-id="{{.ID}}">
        {{range .Blocks}}
        {{template "block-view-inner" (map "NoteID" $.ID "Block" . "HTML" .HTML)}}
        {{end}}
    </div>

    <!-- Floating Action Button -->
    <div class="fab">
        <div id="fab-menu" class="fab-menu hidden">
            <div class="bg-white rounded-xl shadow-lg border p-2 space-y-1 min-w-[10rem]">
                <button hx-post="/note/{{.ID}}/block?type=task"
                        hx-target="#blocks"
                        hx-swap="beforeend"
                        onclick="toggleFab()"
                        class="w-full text-left px-4 py-2.5 rounded-lg hover:bg-gray-50 active:bg-gray-100 text-sm font-medium">
                    + Task
                </button>
                <button hx-post="/note/{{.ID}}/block?type=text"
                        hx-target="#blocks"
                        hx-swap="beforeend"
                        onclick="toggleFab()"
                        class="w-full text-left px-4 py-2.5 rounded-lg hover:bg-gray-50 active:bg-gray-100 text-sm font-medium">
                    + Text
                </button>
                <button onclick="toggleFab(); showNewNoteForm()"
                        class="w-full text-left px-4 py-2.5 rounded-lg hover:bg-gray-50 active:bg-gray-100 text-sm font-medium">
                    + Note
                </button>
            </div>
        </div>
        <button id="fab-btn" onclick="toggleFab()"
                class="w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg flex items-center justify-center text-2xl hover:bg-blue-700 active:bg-blue-800">
            +
        </button>
    </div>

    <!-- New Note Modal (hidden) -->
    <div id="new-note-modal" class="hidden fixed inset-0 bg-black/30 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm">
            <h3 class="text-lg font-semibold mb-4">New Note</h3>
            <form hx-post="/notes" hx-swap="none">
                <input type="text" name="name" placeholder="Note name..."
                       class="w-full px-3 py-2 border rounded-lg text-sm mb-4" autofocus>
                <div class="flex gap-2 justify-end">
                    <button type="button" onclick="hideNewNoteForm()"
                            class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                    <button type="submit"
                            class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function showNewNoteForm() {
            document.getElementById('new-note-modal').classList.remove('hidden');
            document.getElementById('new-note-modal').querySelector('input').focus();
        }
        function hideNewNoteForm() {
            document.getElementById('new-note-modal').classList.add('hidden');
        }
    </script>
</div>
{{end}}

{{define "block-view-inner"}}
<div class="block-wrap pl-2 py-1.5 rounded"
     id="block-{{.NoteID}}-{{.Block.Index}}"
     data-index="{{.Block.Index}}">
    {{if eq .Block.Type "task"}}
    <div class="flex items-center gap-2"{{if gt .Block.Level 0}} style="margin-left: {{.Block.Level}}rem"{{end}}>
        <span class="drag-handle shrink-0 flex items-center justify-center text-gray-400">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                <circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/>
                <circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/>
                <circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/>
            </svg>
        </span>
        <button class="shrink-0 w-6 h-6 flex items-center justify-center"
                hx-put="/note/{{.NoteID}}/block/{{.Block.Index}}/toggle"
                hx-target="#block-{{.NoteID}}-{{.Block.Index}}"
                hx-swap="outerHTML">
            {{if eq .Block.Checked 0}}
                <span class="w-5 h-5 border-2 border-gray-400 rounded block"></span>
            {{else if eq .Block.Checked 1}}
                <span class="w-5 h-5 bg-blue-500 rounded flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                    </svg>
                </span>
            {{else if eq .Block.Checked 2}}
                <span class="w-5 h-5 bg-gray-400 rounded flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 12h12"/>
                    </svg>
                </span>
            {{end}}
        </button>
        <div class="flex-1 min-w-0 {{if eq .Block.Checked 1}}task-done{{end}}{{if eq .Block.Checked 2}}task-cancelled{{end}}"
             hx-get="/note/{{.NoteID}}/block/{{.Block.Index}}/edit"
             hx-target="#block-{{.NoteID}}-{{.Block.Index}}"
             hx-swap="outerHTML">
            {{.HTML}}
        </div>
    </div>
    {{else}}
    <div class="flex items-center gap-2">
        <span class="drag-handle shrink-0 flex items-center justify-center text-gray-400">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                <circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/>
                <circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/>
                <circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/>
            </svg>
        </span>
        <div class="flex-1 min-w-0"
             hx-get="/note/{{.NoteID}}/block/{{.Block.Index}}/edit"
             hx-target="#block-{{.NoteID}}-{{.Block.Index}}"
             hx-swap="outerHTML">
            {{.HTML}}
        </div>
    </div>
    {{end}}
</div>
{{end}}
