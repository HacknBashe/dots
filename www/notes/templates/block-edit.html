{{define "block-edit.html"}}
<div class="block-wrap pl-2 py-1 rounded border-l-blue-500 border-l-3 bg-blue-50/50"
     id="block-{{.NoteID}}-{{.Block.Index}}"
     {{if gt .Block.Level 0}}style="margin-left: {{.Block.Level}}rem"{{end}}>
    <form hx-put="/note/{{.NoteID}}/block/{{.Block.Index}}"
          hx-target="#block-{{.NoteID}}-{{.Block.Index}}"
          hx-swap="outerHTML"
          class="space-y-2">
        <textarea name="content"
                  id="block-edit-ta-{{.NoteID}}-{{.Block.Index}}"
                  data-autoresize
                  rows="1"
                  class="w-full px-3 py-2 border rounded-lg text-sm font-mono resize-y min-h-[2.5rem] overflow-hidden focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                  autofocus>{{.Block.Raw}}</textarea>
        <div class="flex gap-2 items-center">
            <button type="submit"
                    class="px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 active:bg-blue-800">
                Save
            </button>
            <button type="button"
                    hx-get="/note/{{.NoteID}}/block/{{.Block.Index}}"
                    hx-target="#block-{{.NoteID}}-{{.Block.Index}}"
                    hx-swap="outerHTML"
                    class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg">
                Cancel
            </button>
            {{if eq .Block.Type "task"}}
            <span class="ml-auto flex items-center gap-1">
                <label class="text-xs text-gray-500">Due</label>
                <input type="date"
                       class="due-date-input px-2 py-1 text-sm border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       data-textarea-id="block-edit-ta-{{.NoteID}}-{{.Block.Index}}">
                <button type="button"
                        class="due-date-clear px-1.5 py-1 text-xs text-gray-400 hover:text-red-500 rounded hidden"
                        title="Remove due date"
                        data-textarea-id="block-edit-ta-{{.NoteID}}-{{.Block.Index}}">✕</button>
            </span>
            {{end}}
        </div>
    </form>
</div>
{{end}}
